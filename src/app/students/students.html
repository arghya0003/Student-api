<div class="container">
  <div class="header">
    <h2>Students</h2>
    <div class="header-actions">
      <button class="btn-add" (click)="openAdd()">+ Add Student</button>
      <button class="btn-logout" (click)="logout()">Logout</button>
    </div>
  </div>

  <div class="error" *ngIf="error">{{ error }}</div>

  <div class="toolbar">
    <input type="text" [(ngModel)]="searchName" placeholder="Search by name..." (keyup.enter)="search()" />
    <button (click)="search()">Search</button>
    <button (click)="searchName=''; loadStudents()">Clear</button>
  </div>

  <table>
    <thead>
      <tr>
        <th (click)="changeSort('id')">ID</th>
        <th (click)="changeSort('name')">Name</th>
        <th (click)="changeSort('email')">Email</th>
        <th (click)="changeSort('course')">Course</th>
        <th>Created</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let s of students">
        <td>{{ s.id }}</td>
        <td>{{ s.name }}</td>
        <td>{{ s.email }}</td>
        <td>{{ s.course }}</td>
        <td>{{ s.createdAt | date:'short' }}</td>
        <td>
          <button class="btn-edit" (click)="openEdit(s)">Edit</button>
          <button class="btn-delete" (click)="delete(s.id)">Delete</button>
        </td>
      </tr>
      <tr *ngIf="students.length === 0">
        <td colspan="6" class="empty">No students found</td>
      </tr>
    </tbody>
  </table>

  <div class="pagination">
    <button (click)="changePage(currentPage - 1)" [disabled]="currentPage === 0">Prev</button>
    <span>Page {{ currentPage + 1 }} of {{ totalPages }}</span>
    <button (click)="changePage(currentPage + 1)" [disabled]="currentPage >= totalPages - 1">Next</button>
  </div>
</div>

<div class="modal-overlay" *ngIf="showForm">
  <div class="modal">
    <h3>{{ editingId ? 'Edit Student' : 'Add Student' }}</h3>

    <div class="form-group">
      <label>Name</label>
      <input type="text" [(ngModel)]="form.name" placeholder="Full name" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="form.email" placeholder="Email address" />
    </div>
    <div class="form-group">
      <label>Course</label>
      <input type="text" [(ngModel)]="form.course" placeholder="Course name" />
    </div>

    <div class="modal-actions">
      <button class="btn-save" (click)="save()">{{ editingId ? 'Update' : 'Create' }}</button>
      <button class="btn-cancel" (click)="showForm = false">Cancel</button>
    </div>
  </div>
</div>
